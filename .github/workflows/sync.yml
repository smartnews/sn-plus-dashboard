name: Sync Dashboard from Google Drive
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download latest HTML
        run: curl -L "https://drive.google.com/uc?export=download&id=11sRDbOmqlRKRdH70nEM_xvHclXvImn8T" -o index.html
      - name: Push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --staged --quiet || (git commit -m "chore: update dashboard data $(date -u +%Y-%m-%d)" && git push)
